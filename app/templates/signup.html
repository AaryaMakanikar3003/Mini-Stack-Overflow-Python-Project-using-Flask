<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup - Mini Stack Overflow</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;
            align-items:center;

            background:#050816;

            overflow:hidden;

            color:white;

        }

        /* ================= BACKGROUND ================= */

        .background{

            position:fixed;

            width:100%;
            height:100vh;

            top:0;
            left:0;

            z-index:-2;

            overflow:hidden;

            background:linear-gradient(to bottom right,#050816,#0f172a,#111827);

        }

        .gradient1,
        .gradient2,
        .gradient3{

            position:absolute;

            border-radius:50%;

            filter:blur(120px);

            animation:float 10s infinite ease-in-out;

        }

        .gradient1{

            width:400px;
            height:400px;

            background:#7c3aed;

            top:-100px;
            left:-100px;

        }

        .gradient2{

            width:350px;
            height:350px;

            background:#06b6d4;

            bottom:-100px;
            right:-100px;

            animation-delay:2s;

        }

        .gradient3{

            width:300px;
            height:300px;

            background:#ec4899;

            top:40%;
            left:50%;

            animation-delay:4s;

        }

        @keyframes float{

            0%{
                transform:translateY(0px) translateX(0px);
            }

            50%{
                transform:translateY(-40px) translateX(20px);
            }

            100%{
                transform:translateY(0px) translateX(0px);
            }
        }

        /* ================= SIGNUP CARD ================= */

        .signup-card{

            width:430px;

            padding:40px 45px;

            background:rgba(255,255,255,0.05);

            border:1px solid rgba(255,255,255,0.1);

            backdrop-filter:blur(20px);

            border-radius:30px;

            box-shadow:0 25px 50px rgba(0,0,0,0.5);

            position:relative;

            overflow:hidden;

        }

        .signup-card::before{

            content:'';

            position:absolute;

            width:220px;
            height:220px;

            background:rgba(255,255,255,0.06);

            border-radius:50%;

            top:-100px;
            right:-100px;

        }

        h1{

            font-size:42px;

            margin-bottom:12px;

            line-height:1.2;

            background:linear-gradient(to right,#38bdf8,#a855f7,#ec4899);

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;

        }

        .subtitle{

            color:#cbd5e1;

            margin-bottom:32px;

            line-height:1.7;

            font-size:16px;

        }

        /* ================= FLASH MESSAGE ================= */

        .flash-message{

            padding:14px;

            border-radius:14px;

            margin-bottom:20px;

            font-size:14px;

            text-align:center;

        }

        .success{

            background:rgba(34,197,94,0.2);

            border:1px solid rgba(34,197,94,0.5);

            color:#86efac;

        }

        .error{

            background:rgba(239,68,68,0.2);

            border:1px solid rgba(239,68,68,0.5);

            color:#fca5a5;

        }

        /* ================= INPUTS ================= */

        .input-group{

            margin-bottom:22px;

        }

        .input-group label{

            display:block;

            margin-bottom:10px;

            font-size:15px;

            color:#e2e8f0;

            font-weight:500;

        }

        .input-group input{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:16px;

            background:rgba(255,255,255,0.07);

            border:1px solid rgba(255,255,255,0.08);

            color:white;

            font-size:15px;

            transition:0.3s;

        }

        .input-group input:focus{

            border:1px solid #38bdf8;

            box-shadow:0 0 20px rgba(56,189,248,0.3);

        }

        .input-group input::placeholder{

            color:#94a3b8;

        }

        /* ================= BUTTON ================= */

        .signup-btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:18px;

            background:linear-gradient(to right,#7c3aed,#06b6d4);

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

            margin-top:8px;

            box-shadow:0 0 25px rgba(124,58,237,0.4);

        }

        .signup-btn:hover{

            transform:translateY(-5px);

            box-shadow:0 0 40px rgba(124,58,237,0.7);

        }

        /* ================= FOOTER ================= */

        .bottom-text{

            text-align:center;

            margin-top:28px;

            color:#cbd5e1;

            font-size:14px;

        }

        .bottom-text a{

            color:#38bdf8;

            text-decoration:none;

            font-weight:500;

        }

        .bottom-text a:hover{

            text-decoration:underline;

        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:500px){

            .signup-card{

                width:92%;

                padding:35px 25px;

            }

            h1{

                font-size:34px;

            }

        }

    </style>
</head>

<body>

    <!-- ================= BACKGROUND ================= -->

    <div class="background">

        <div class="gradient1"></div>
        <div class="gradient2"></div>
        <div class="gradient3"></div>

    </div>

    <!-- ================= SIGNUP CARD ================= -->

    <div class="signup-card">

        <h1>
            Create Account
        </h1>

        <p class="subtitle">

            Join the futuristic developer community
            and start asking questions.

        </p>

        <!-- ================= FLASH MESSAGES ================= -->

        {% with messages = get_flashed_messages(with_categories=true) %}

            {% if messages %}

                {% for category, message in messages %}

                    <div class="flash-message {{ category }}">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <!-- ================= FORM ================= -->

        <form method="POST">

            <div class="input-group">

                <label>
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter username"
                >

            </div>

            <div class="input-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter email"
                >

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                >

            </div>

            <button class="signup-btn" type="submit">

                Create Account

            </button>

        </form>

        <!-- ================= FOOTER ================= -->

        <div class="bottom-text">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </div>

    </div>

</body>
</html>
